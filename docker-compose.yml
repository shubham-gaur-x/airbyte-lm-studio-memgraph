services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: meeting_memory
      POSTGRES_USER: meeting_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting_user -d meeting_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

  memgraph:
    image: memgraph/memgraph-platform:latest
    ports:
      - "7687:7687"
      - "7444:7444"
      - "3000:3000"
    volumes:
      - memgraph_data:/var/lib/memgraph
    environment:
      MEMGRAPH_ARGS: "--log-level=WARNING"
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --no-history 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  memgraph-mcp:
    image: memgraph/mcp-memgraph:latest
    ports:
      - "8001:8000"
    environment:
      MEMGRAPH_URL: bolt://memgraph:7687
      MEMGRAPH_USER: ${MEMGRAPH_USER:-""}
      MEMGRAPH_PASSWORD: ${MEMGRAPH_PASSWORD:-""}
      MCP_READ_ONLY: "false"
      MCP_TRANSPORT: streamable-http
    depends_on:
      memgraph:
        condition: service_healthy

  ngrok:
    image: ngrok/ngrok:latest
    command: start --all --config /etc/ngrok.yml
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"
    depends_on:
      postgres:
        condition: service_healthy

  bore:
    build:
      context: .
      dockerfile: dockerfiles/bore.Dockerfile
    command: local 5432 --to bore.pub --local-host postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  transform_service:
    build:
      context: .
      dockerfile: transform_service/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      memgraph:
        condition: service_healthy
    volumes:
      - ./transform_service:/app/transform_service
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./dev_agent:/app/dev_agent
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dev_agent:
    build:
      context: .
      dockerfile: dev_agent/Dockerfile
    ports:
      - "8002:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./transform_service:/app/transform_service:ro
      - ./dev_agent:/app/dev_agent
      - dev_agent_repo:/work/repo
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  memgraph_data:
  dev_agent_repo:
